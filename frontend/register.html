<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Job-Tracker</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-visual">
    <div class="auth-brand">Job<span>Tracker</span></div>
    <div class="auth-quote">"The search feels shorter when you can see how far you've come."</div>
    <div class="auth-trail-caption">APPLIED · INTERVIEWING · OFFER</div>
  </div>

  <div class="auth-form-side">
    <div class="auth-form-card">
      <h1>Start your trail</h1>
      <p class="sub">Create a free account to track every application in one place.</p>

      <div class="form-error" id="formError"></div>

      <form id="registerForm" novalidate>
        <div class="field">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Alex Rivera" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Create account</button>
      </form>

      <div class="auth-switch">Already have an account? <a href="login.html">Log in</a></div>
      <div class="auth-switch"><a href="index.html">← Back to home</a></div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
