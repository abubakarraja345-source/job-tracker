<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="https://i.postimg.cc/K8z39PLL/favicon-192.png">
<title>Add application — 4JobTracker</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand"><img src="assets/logo/logo-mark-ondark.svg" alt="" class="brand-icon">4Job<span>Tracker</span></div>
    <ul class="trail-nav">
      <li><a href="dashboard.html" data-page="dashboard"><span class="trail-dot"></span>Dashboard</a></li>
      <li><a href="applications.html" data-page="applications"><span class="trail-dot"></span>Applications</a></li>
      <li><a href="add-job.html" data-page="add-job"><span class="trail-dot"></span>Add application</a></li>
      <li><a href="reminders.html" data-page="reminders"><span class="trail-dot"></span>Reminders</a></li>
      <li><a href="profile.html" data-page="profile"><span class="trail-dot"></span>Profile</a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <strong id="sidebarUserName">—</strong>
        <span id="sidebarUserEmail">—</span>
      </div>
      <button class="btn btn-ghost btn-sm btn-block" id="logoutBtn">Log out</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div>
        <span class="eyebrow">New waypoint</span>
        <h1 id="pageTitle">Add application</h1>
      </div>
    </div>

    <div class="card card-pad" style="max-width:640px;">
      <div class="form-error" id="formError"></div>
      <div class="form-success" id="formSuccess"></div>

      <form id="jobForm" novalidate>
        <input type="hidden" id="jobId">
        <div class="field-row">
          <div class="field">
            <label for="companyName">Company</label>
            <input type="text" id="companyName" placeholder="Northwind Analytics" required>
          </div>
          <div class="field">
            <label for="jobTitle">Job title</label>
            <input type="text" id="jobTitle" placeholder="Product Designer" required>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="jobLocation">Location</label>
            <input type="text" id="jobLocation" placeholder="Remote / City, Country">
          </div>
          <div class="field">
            <label for="status">Status</label>
            <select id="status">
              <option value="Applied">Applied</option>
              <option value="Interviewing">Interviewing</option>
              <option value="Offer">Offer</option>
              <option value="Rejected">Rejected</option>
              <option value="Withdrawn">Withdrawn</option>
            </select>
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="salaryMin">Salary min (optional)</label>
            <input type="number" id="salaryMin" placeholder="70000">
          </div>
          <div class="field">
            <label for="salaryMax">Salary max (optional)</label>
            <input type="number" id="salaryMax" placeholder="90000">
          </div>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="appliedDate">Applied date</label>
            <input type="date" id="appliedDate">
          </div>
          <div class="field">
            <label for="jobUrl">Job posting URL (optional)</label>
            <input type="url" id="jobUrl" placeholder="https://…">
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">Save application</button>
      </form>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/add-job.js"></script>
</body>
</html>
