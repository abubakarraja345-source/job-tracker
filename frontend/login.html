<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — Job-Tracker</title>
<link rel="icon" type="image/png" href="https://i.postimg.cc/K8z39PLL/favicon-192.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-visual">
    <div class="auth-brand">Job<span>Tracker</span></div>
    <div class="auth-quote">"Every offer starts as a single line on a trail. Keep walking it."</div>
    <div class="auth-trail-caption">APPLIED · INTERVIEWING · OFFER</div>
  </div>

  <div class="auth-form-side">
    <div class="auth-form-card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to pick up your trail where you left off.</p>

      <div class="form-error" id="formError"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Log in</button>
      </form>

      <div class="auth-switch">New here? <a href="register.html">Create an account</a></div>
      <div class="auth-switch"><a href="index.html">← Back to home</a></div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
