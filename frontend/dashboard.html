<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="https://i.postimg.cc/K8z39PLL/favicon-192.png">
<title>Dashboard — 4JobTracker</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand"><img src="assets/logo/logo-mark-ondark.svg" alt="" class="brand-icon">4Job<span>Tracker</span></div>
    <ul class="trail-nav">
      <li><a href="dashboard.html" data-page="dashboard"><span class="trail-dot"></span>Dashboard</a></li>
      <li><a href="applications.html" data-page="applications"><span class="trail-dot"></span>Applications</a></li>
      <li><a href="add-job.html" data-page="add-job"><span class="trail-dot"></span>Add application</a></li>
      <li><a href="reminders.html" data-page="reminders"><span class="trail-dot"></span>Reminders</a></li>
      <li><a href="profile.html" data-page="profile"><span class="trail-dot"></span>Profile</a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <strong id="sidebarUserName">—</strong>
        <span id="sidebarUserEmail">—</span>
      </div>
      <button class="btn btn-ghost btn-sm btn-block" id="logoutBtn">Log out</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div>
        <span class="eyebrow">Your trail</span>
        <h1>Dashboard</h1>
      </div>
      <a href="add-job.html" class="btn btn-primary">+ Add application</a>
    </div>

    <div class="stat-grid" id="statGrid">
      <div class="stat-card"><span class="label">Total applications</span><span class="value">—</span></div>
      <div class="stat-card accent-gold"><span class="label">Interviewing</span><span class="value">—</span></div>
      <div class="stat-card accent-forest"><span class="label">Offers</span><span class="value">—</span></div>
      <div class="stat-card accent-coral"><span class="label">Rejected</span><span class="value">—</span></div>
    </div>

    <div class="chart-grid">
      <div class="card card-pad chart-card">
        <h3>Applications over time</h3>
        <canvas id="monthChart" height="110"></canvas>
      </div>
      <div class="card card-pad chart-card">
        <h3>By status</h3>
        <canvas id="statusChart" height="110"></canvas>
      </div>
    </div>

    <div class="card card-pad">
      <h3>Upcoming reminders</h3>
      <div id="upcomingReminders"><p class="muted">Loading…</p></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/charts.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
