<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="assets/logo/logo-mark.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/logo/favicon-32.png">
<link rel="apple-touch-icon" href="assets/logo/apple-touch-icon.png">
<title>Profile — 4JobTracker</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand"><img src="assets/logo/logo-mark-ondark.svg" alt="" class="brand-icon">4Job<span>Tracker</span></div>
    <ul class="trail-nav">
      <li><a href="dashboard.html" data-page="dashboard"><span class="trail-dot"></span>Dashboard</a></li>
      <li><a href="applications.html" data-page="applications"><span class="trail-dot"></span>Applications</a></li>
      <li><a href="add-job.html" data-page="add-job"><span class="trail-dot"></span>Add application</a></li>
      <li><a href="reminders.html" data-page="reminders"><span class="trail-dot"></span>Reminders</a></li>
      <li><a href="profile.html" data-page="profile"><span class="trail-dot"></span>Profile</a></li>
    </ul>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <strong id="sidebarUserName">—</strong>
        <span id="sidebarUserEmail">—</span>
      </div>
      <button class="btn btn-ghost btn-sm btn-block" id="logoutBtn">Log out</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div>
        <span class="eyebrow">Your account</span>
        <h1>Profile</h1>
      </div>
    </div>

    <div class="card card-pad" style="max-width:480px;">
      <div class="form-error" id="formError"></div>
      <div class="form-success" id="formSuccess"></div>

      <form id="profileForm">
        <div class="field">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" disabled>
        </div>
        <div class="field">
          <label for="password">New password (optional)</label>
          <input type="password" id="password" placeholder="Leave blank to keep current password">
        </div>
        <button type="submit" class="btn btn-primary">Save changes</button>
      </form>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
